<svg viewBox="0 0 280 190" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pawn full logo mark
    Chess pawn piece · "Pawn" wordmark · tagline below
    Sky-400 (#38bdf8) on transparent background
  -->

  <!-- Crown (sphere) -->
  <circle cx="140" cy="24" r="18" fill="#38bdf8"/>

  <!-- Neck -->
  <rect x="130" y="40" width="20" height="12" rx="4" fill="#38bdf8"/>

  <!-- Collar / crossbar -->
  <rect x="114" y="50" width="52" height="10" rx="5" fill="#38bdf8"/>

  <!-- Body (tapered column) -->
  <path d="M 118 60 L 124 104 L 156 104 L 162 60 Z" fill="#38bdf8"/>

  <!-- Base platform -->
  <rect x="106" y="104" width="68" height="14" rx="7" fill="#38bdf8"/>

  <!-- Base foot -->
  <rect x="96" y="116" width="88" height="16" rx="8" fill="#38bdf8"/>

  <!-- "Pawn" wordmark -->
  <text
    x="140" y="158"
    text-anchor="middle"
    font-family="'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="700"
    fill="#38bdf8"
    letter-spacing="-0.4"
  >Pawn</text>

  <!-- Tagline -->
  <text
    x="140" y="178"
    text-anchor="middle"
    font-family="'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11.5" font-weight="500"
    fill="#64748b"
    letter-spacing="0.6"
  >Agentic workflows for engineers</text>
</svg>

<svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pawn full logo mark
    Filled chess pawn piece + "Pawn" wordmark to the right
    Sky-400 (#38bdf8) on transparent background
  -->

  <!-- Pawn icon (filled, scaled from 24x24 viewBox) -->
  <g transform="translate(40, 20) scale(4)">
    <!-- Head -->
    <circle cx="12" cy="6" r="4" fill="#38bdf8"/>
    <!-- Collar bar -->
    <rect x="7" y="9.5" width="10" height="1.5" rx="0.75" fill="#38bdf8"/>
    <!-- Body (tapered) -->
    <path d="M8 11 L9.5 18 L14.5 18 L16 11 Z" fill="#38bdf8"/>
    <!-- Base -->
    <path d="M5 20a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z" fill="#38bdf8"/>
  </g>

  <!-- "Pawn" wordmark -->
  <text
    x="160" y="78"
    text-anchor="start"
    font-family="'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="38" font-weight="700"
    fill="#f8fafc"
    letter-spacing="-0.5"
  >Pawn</text>

  <!-- Tagline -->
  <text
    x="160" y="102"
    text-anchor="start"
    font-family="'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" font-weight="500"
    fill="#64748b"
    letter-spacing="0.6"
  >Agentic workflows for engineers</text>
</svg>

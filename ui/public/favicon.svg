<svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Pawn chess piece — sky-400 on transparent bg -->

  <!-- Crown (sphere) -->
  <circle cx="50" cy="18" r="14" fill="#38bdf8"/>

  <!-- Neck -->
  <rect x="42" y="30" width="16" height="10" rx="3" fill="#38bdf8"/>

  <!-- Collar / crossbar -->
  <rect x="30" y="38" width="40" height="8" rx="4" fill="#38bdf8"/>

  <!-- Body (tapered column) -->
  <path d="M 34 46 L 38 80 L 62 80 L 66 46 Z" fill="#38bdf8" rx="2"/>

  <!-- Base platform -->
  <rect x="22" y="80" width="56" height="12" rx="6" fill="#38bdf8"/>

  <!-- Base foot -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pawn — Agentic Workflow Orchestration</title>
    <meta name="description" content="Pawn is an agentic workflow orchestration platform. Build, run, and manage AI pipelines with workers, skills, and automated scheduling." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pawn — Agentic Workflow Orchestration" />
    <meta property="og:description" content="Build, run, and manage AI pipelines with workers, skills, and automated scheduling." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Theme — blocking script sets .dark class before first paint -->
    <script>
      (function () {
        var VALID = { system: 1, light: 1, dark: 1 };
        var pref = "system";
        try { var s = localStorage.getItem("pawn_theme"); if (s && VALID[s]) pref = s; } catch (e) {}
        var dark = pref === "dark" || (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        var cs = document.querySelector('meta[name="color-scheme"]');
        if (cs) cs.setAttribute("content", dark ? "dark" : "light");
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute("content", dark ? "#0d0c0a" : "#f7f5f2");
      })();
    </script>
    <meta name="theme-color" content="#f7f5f2" />
    <meta name="color-scheme" content="light" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800&f[]=satoshi@400,500,700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800&f[]=satoshi@400,500,700&display=swap" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

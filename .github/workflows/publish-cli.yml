name: Publish CLI

on:
  push:
    branches:
      - main
    paths:
      - packages/cli/**
jobs:
  publish:
    name: Publish @i75corridor/pawn-cli to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@i75corridor"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @i75corridor/pawn-cli build

      - name: Publish
        run: pnpm --filter @i75corridor/pawn-cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgV2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020912"/>
      <stop offset="100%" stop-color="#050e1a"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0055cc"/>

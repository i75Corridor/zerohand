<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background: deep slate gradient -->
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Pawn glow halo -->
    <radialGradient id="halo5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Crisp edge glow on pawn -->
    <filter id="pawnEdge5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft bloom behind pawn -->
    <filter id="bloom5" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Wordmark glow -->
    <filter id="textGlow5" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg5)"/>

  <!-- Subtle dot grid -->
  <g fill="#1e293b" opacity="0.45">
    <circle cx="40"  cy="40"  r="1"/><circle cx="80"  cy="40"  r="1"/><circle cx="120" cy="40"  r="1"/>
    <circle cx="160" cy="40"  r="1"/><circle cx="200" cy="40"  r="1"/><circle cx="240" cy="40"  r="1"/>
    <circle cx="280" cy="40"  r="1"/><circle cx="320" cy="40"  r="1"/><circle cx="360" cy="40"  r="1"/>
    <circle cx="40"  cy="80"  r="1"/><circle cx="80"  cy="80"  r="1"/><circle cx="120" cy="80"  r="1"/>
    <circle cx="160" cy="80"  r="1"/><circle cx="200" cy="80"  r="1"/><circle cx="240" cy="80"  r="1"/>
    <circle cx="280" cy="80"  r="1"/><circle cx="320" cy="80"  r="1"/><circle cx="360" cy="80"  r="1"/>
    <circle cx="40"  cy="120" r="1"/><circle cx="80"  cy="120" r="1"/><circle cx="120" cy="120" r="1"/>
    <circle cx="160" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="240" cy="120" r="1"/>
    <circle cx="280" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="360" cy="120" r="1"/>
    <circle cx="40"  cy="160" r="1"/><circle cx="80"  cy="160" r="1"/><circle cx="120" cy="160" r="1"/>
    <circle cx="160" cy="160" r="1"/><circle cx="200" cy="160" r="1"/><circle cx="240" cy="160" r="1"/>
    <circle cx="280" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="360" cy="160" r="1"/>
    <circle cx="40"  cy="200" r="1"/><circle cx="80"  cy="200" r="1"/><circle cx="120" cy="200" r="1"/>
    <circle cx="160" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="240" cy="200" r="1"/>
    <circle cx="280" cy="200" r="1"/><circle cx="320" cy="200" r="1"/><circle cx="360" cy="200" r="1"/>
    <circle cx="40"  cy="240" r="1"/><circle cx="80"  cy="240" r="1"/><circle cx="120" cy="240" r="1"/>
    <circle cx="160" cy="240" r="1"/><circle cx="200" cy="240" r="1"/><circle cx="240" cy="240" r="1"/>
    <circle cx="280" cy="240" r="1"/><circle cx="320" cy="240" r="1"/><circle cx="360" cy="240" r="1"/>
    <circle cx="40"  cy="280" r="1"/><circle cx="80"  cy="280" r="1"/><circle cx="120" cy="280" r="1"/>
    <circle cx="160" cy="280" r="1"/><circle cx="200" cy="280" r="1"/><circle cx="240" cy="280" r="1"/>
    <circle cx="280" cy="280" r="1"/><circle cx="320" cy="280" r="1"/><circle cx="360" cy="280" r="1"/>
    <circle cx="40"  cy="320" r="1"/><circle cx="80"  cy="320" r="1"/><circle cx="120" cy="320" r="1"/>
    <circle cx="160" cy="320" r="1"/><circle cx="200" cy="320" r="1"/><circle cx="240" cy="320" r="1"/>
    <circle cx="280" cy="320" r="1"/><circle cx="320" cy="320" r="1"/><circle cx="360" cy="320" r="1"/>
    <circle cx="40"  cy="360" r="1"/><circle cx="80"  cy="360" r="1"/><circle cx="120" cy="360" r="1"/>
    <circle cx="160" cy="360" r="1"/><circle cx="200" cy="360" r="1"/><circle cx="240" cy="360" r="1"/>
    <circle cx="280" cy="360" r="1"/><circle cx="320" cy="360" r="1"/><circle cx="360" cy="360" r="1"/>
  </g>

  <!-- Central ambient halo -->
  <ellipse cx="200" cy="155" rx="140" ry="120" fill="url(#halo5)"/>

  <!-- Pawn: bloom layer (sky glow behind) -->
  <g transform="translate(155, 40) scale(1.9)" filter="url(#bloom5)" opacity="0.55">
    <circle cx="24" cy="10" r="10" fill="#38bdf8"/>
    <rect x="18" y="19" width="12" height="7" rx="2" fill="#38bdf8"/>
    <rect x="10" y="25" width="28" height="6" rx="3" fill="#38bdf8"/>
    <path d="M 13 31 L 16 56 L 32 56 L 35 31 Z" fill="#38bdf8"/>
    <rect x="8" y="56" width="32" height="8" rx="4" fill="#38bdf8"/>
    <rect x="4" y="63" width="40" height="9" rx="4.5" fill="#38bdf8"/>
  </g>

  <!-- Pawn: crisp main render with ambient float animation -->
  <g transform="translate(155, 40) scale(1.9)" filter="url(#pawnEdge5)" class="animate-pawn-hero-float">
    <!-- Crown (sphere) -->
    <circle cx="24" cy="10" r="10" fill="#38bdf8"/>
    <!-- Neck -->
    <rect x="18" y="19" width="12" height="7" rx="2" fill="#38bdf8"/>
    <!-- Collar / crossbar -->
    <rect x="10" y="25" width="28" height="6" rx="3" fill="#38bdf8"/>
    <!-- Body (tapered column) -->
    <path d="M 13 31 L 16 56 L 32 56 L 35 31 Z" fill="#38bdf8"/>
    <!-- Subtle body highlight -->
    <rect x="14" y="32" width="20" height="8" rx="3" fill="rgba(255,255,255,0.07)"/>
    <!-- Base platform -->
    <rect x="8" y="56" width="32" height="8" rx="4" fill="#38bdf8"/>
    <!-- Base foot -->
    <rect x="4" y="63" width="40" height="9" rx="4.5" fill="#38bdf8"/>
  </g>

  <!-- Divider -->
  <line x1="140" y1="282" x2="260" y2="282" stroke="#0ea5e9" stroke-width="0.75" opacity="0.25"/>

  <!-- Wordmark -->
  <g filter="url(#textGlow5)">
    <text
      x="200" y="318"
      font-family="'Arial Black', 'Helvetica Neue', Helvetica, sans-serif"
      font-size="34" font-weight="900" letter-spacing="-1"
      text-anchor="middle" fill="#f8fafc">Pawn</text>
  </g>

  <!-- Tagline -->
  <text
    x="200" y="342"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11.5" letter-spacing="0.4"
    text-anchor="middle" fill="#475569">Agentic workflows for engineers</text>

  <!-- Corner L-brackets -->
  <g stroke="#0ea5e9" stroke-width="1.2" opacity="0.22" fill="none" stroke-linecap="square">
    <polyline points="14,34 14,14 34,14"/>
    <polyline points="366,14 386,14 386,34"/>
    <polyline points="14,366 14,386 34,386"/>
    <polyline points="386,366 386,386 366,386"/>
  </g>

  <!-- Corner accent dots -->
  <g fill="#0ea5e9" opacity="0.35">
    <circle cx="14" cy="14" r="1.5"/>
    <circle cx="386" cy="14" r="1.5"/>
    <circle cx="14" cy="386" r="1.5"/>
    <circle cx="386" cy="386" r="1.5"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgV3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030a12"/>
      <stop offset="100%" stop-color="#071525"/>
    </linearGradient>
    <linearGradient id="fistV3" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="40%" stop-color="#0090ee"/>
      <stop offset="100%" stop-color="#0030a0"/>
    </linearGradient>
    <linearGradient id="fistShineV3" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="g3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3big" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3med" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shad3">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0033aa" flood-opacity="0.55"/>
    </filter>
    <radialGradient id="pmask" cx="50%" cy="50%" r="50%">
      <stop offset="35%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="pFade">
      <rect width="400" height="400" fill="url(#pmask)"/>
    </mask>
  </defs>

  <!-- BG -->
  <rect width="400" height="400" fill="url(#bgV3)"/>

  <!-- Binary rain streams -->
  <g mask="url(#pFade)" opacity="0.15" fill="#00aadd" font-family="monospace" font-size="7">
    <text x="42" y="58">1</text><text x="42" y="70">0</text><text x="42" y="82">1</text>
    <text x="42" y="94">1</text><text x="42" y="106">0</text><text x="42" y="118">0</text>
    <text x="42" y="130">1</text><text x="42" y="142">1</text>
    <text x="66" y="76">0</text><text x="66" y="88">1</text><text x="66" y="100">0</text>
    <text x="66" y="112">1</text><text x="66" y="124">1</text><text x="66" y="136">0</text>
    <text x="320" y="88">1</text><text x="320" y="100">0</text><text x="320" y="112">1</text>
    <text x="320" y="124">0</text><text x="320" y="136">1</text>
    <text x="344" y="68">0</text><text x="344" y="80">1</text><text x="344" y="92">1</text>
    <text x="344" y="104">0</text><text x="344" y="116">0</text><text x="344" y="128">1</text>
    <text x="90" y="298">1</text><text x="90" y="310">0</text><text x="90" y="322">1</text>
    <text x="90" y="334">0</text><text x="90" y="346">1</text>
    <text x="298" y="288">0</text><text x="298" y="300">1</text><text x="298" y="312">1</text>
    <text x="298" y="324">0</text><text x="298" y="336">1</text><text x="298" y="348">0</text>
  </g>

  <!-- Radar / sonar rings -->
  <g fill="none" opacity="0.12">
    <circle cx="200" cy="208" r="152" stroke="#00aaff" stroke-width="0.8"/>
    <circle cx="200" cy="208" r="128" stroke="#00aaff" stroke-width="0.8"/>
    <circle cx="200" cy="208" r="104" stroke="#00ccff" stroke-width="1"/>
    <circle cx="200" cy="208" r="80"  stroke="#00ccff" stroke-width="0.8"/>
  </g>

  <!-- Crosshairs -->
  <g stroke="#00aadd" stroke-width="0.5" opacity="0.1">
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="48" y1="208" x2="352" y2="208"/>
  </g>

  <!-- Ambient halo -->
  <ellipse cx="200" cy="208" rx="100" ry="90" fill="#0044cc" opacity="0.08" filter="url(#g3big)"/>

  <!-- Agent network nodes — left -->
  <g filter="url(#g3)" opacity="0.8">
    <circle cx="74" cy="158" r="4.5" fill="#00aaff"/>
    <circle cx="96" cy="195" r="3.5" fill="#0088cc"/>
    <circle cx="70" cy="225" r="4" fill="#00aaff"/>
    <circle cx="100" cy="248" r="3" fill="#0066bb"/>
  </g>
  <!-- Agent network nodes — right -->
  <g filter="url(#g3)" opacity="0.8">
    <circle cx="326" cy="158" r="4.5" fill="#00aaff"/>
    <circle cx="304" cy="195" r="3.5" fill="#0088cc"/>
    <circle cx="330" cy="225" r="4" fill="#00aaff"/>
    <circle cx="300" cy="248" r="3" fill="#0066bb"/>
  </g>

  <!-- Inter-node connectors -->
  <g stroke="#004477" stroke-width="0.7" fill="none" opacity="0.45">
    <line x1="74" y1="158" x2="96" y2="195"/>
    <line x1="96" y1="195" x2="70" y2="225"/>
    <line x1="70" y1="225" x2="100" y2="248"/>
    <line x1="326" y1="158" x2="304" y2="195"/>
    <line x1="304" y1="195" x2="330" y2="225"/>
    <line x1="330" y1="225" x2="300" y2="248"/>
  </g>

  <!-- Lines connecting node clusters to fist edges -->
  <g stroke="#00aadd" stroke-width="0.8" fill="none" opacity="0.28">
    <line x1="96" y1="195" x2="153" y2="210"/>
    <line x1="74" y1="158" x2="155" y2="175"/>
    <line x1="70" y1="225" x2="153" y2="228"/>
    <line x1="304" y1="195" x2="247" y2="210"/>
    <line x1="326" y1="158" x2="245" y2="175"/>
    <line x1="330" y1="225" x2="247" y2="228"/>
  </g>

  <!-- === SOLID BOLD ORGANIC FIST === -->
  <!-- Drop shadow -->
  <path d="
    M 152,196
    C 150,186 150,175 155,169
    C 158,163 165,162 170,165
    C 171,158 176,151 184,150
    C 192,149 199,154 201,161
    C 203,154 210,148 219,148
    C 228,148 235,154 236,161
    C 238,155 245,151 253,153
    C 262,155 267,163 265,172
    C 268,169 274,172 276,181
    C 279,192 276,207 269,218
    C 274,223 276,236 271,246
    C 265,256 253,258 246,252
    L 244,282
    C 243,293 236,300 224,300
    L 176,300
    C 164,300 157,293 156,282
    Z
  " fill="#0033aa" opacity="0.4" filter="url(#shad3)" transform="translate(4,7)"/>

  <!-- Main fist -->
  <path d="
    M 152,196
    C 150,186 150,175 155,169
    C 158,163 165,162 170,165
    C 171,158 176,151 184,150
    C 192,149 199,154 201,161
    C 203,154 210,148 219,148
    C 228,148 235,154 236,161
    C 238,155 245,151 253,153
    C 262,155 267,163 265,172
    C 268,169 274,172 276,181
    C 279,192 276,207 269,218
    C 274,223 276,236 271,246
    C 265,256 253,258 246,252
    L 244,282
    C 243,293 236,300 224,300
    L 176,300
    C 164,300 157,293 156,282
    Z
  " fill="url(#fistV3)"/>

  <!-- Shine highlight -->
  <path d="
    M 155,169 C 158,163 165,162 170,165 C 171,158 176,151 184,150
    C 192,149 199,154 201,161 C 203,154 210,148 219,148
    C 228,148 235,154 236,161 C 238,155 245,151 253,153
    C 262,155 267,163 265,172 L 265,206 L 152,206 L 152,196 Z
  " fill="url(#fistShineV3)"/>

  <!-- Knuckle grooves -->
  <g stroke="#001e55" stroke-width="2.5" opacity="0.5" stroke-linecap="round">
    <line x1="176" y1="196" x2="175" y2="216"/>
    <line x1="203" y1="196" x2="202" y2="216"/>
    <line x1="232" y1="196" x2="231" y2="216"/>
  </g>

  <!-- Knuckle glow nodes -->
  <g filter="url(#g3)">
    <circle cx="163" cy="167" r="6" fill="#00ffff" opacity="0.95"/>
    <circle cx="190" cy="158" r="6" fill="#00ffff"/>
    <circle cx="219" cy="152" r="6.5" fill="#00ffff"/>
    <circle cx="247" cy="157" r="6" fill="#00ffff" opacity="0.95"/>
  </g>

  <!-- Knuckle arc -->
  <path d="M 163,167 C 180,155 202,148 219,152 C 233,155 245,157 247,157"
        fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.55" stroke-dasharray="4,3"/>

  <!-- Horizontal divider -->
  <line x1="78" y1="318" x2="322" y2="318" stroke="#00aadd" stroke-width="0.5" opacity="0.3"/>

  <!-- Wordmark -->
  <g filter="url(#g3med)">
    <text x="200" y="340" font-family="'Arial Black', 'Arial Bold', sans-serif"
          font-size="26" font-weight="900" letter-spacing="6"
          text-anchor="middle" fill="#00ddff">ZEROHAND</text>
  </g>
  <text x="200" y="356" font-family="'Courier New', monospace"
        font-size="8" letter-spacing="3.5"
        text-anchor="middle" fill="#005577" opacity="0.8">HUMANLESS · AGENTIC · AUTONOMOUS</text>

  <!-- Top label -->
  <text x="200" y="46" font-family="'Courier New', monospace"
        font-size="8" letter-spacing="2"
        text-anchor="middle" fill="#004466" opacity="0.55">AI ORCHESTRATION HARNESS</text>

  <!-- Status chips -->
  <rect x="296" y="28" width="70" height="14" rx="3" fill="#001122" stroke="#003355" stroke-width="0.5"/>
  <rect x="298" y="30" width="42" height="10" rx="2" fill="#0055aa" opacity="0.7"/>
  <text x="370" y="40" font-family="monospace" font-size="7" text-anchor="end" fill="#00aadd">SYS OK</text>

  <rect x="34" y="28" width="70" height="14" rx="3" fill="#001122" stroke="#003355" stroke-width="0.5"/>
  <text x="69" y="40" font-family="monospace" font-size="7" text-anchor="middle" fill="#004466">v0.1.0</text>
</svg>
